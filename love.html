<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💌 Do you love me?</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
 
body{
  min-height:100vh;
  background:radial-gradient(ellipse at 60% 10%, #1b5e35 0%, #0d2b1a 55%, #051209 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Nunito',sans-serif;
  overflow:hidden;
  position:relative;
}
 
.star{position:fixed;border-radius:50%;background:#fff;pointer-events:none;}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}
 
.ff{position:fixed;width:5px;height:5px;border-radius:50%;
  background:#b9ff72;box-shadow:0 0 8px 3px #b9ff72;pointer-events:none;z-index:1;}
@keyframes ffmove{
  0%{transform:translate(0,0);opacity:0;}20%{opacity:1;}
  50%{transform:translate(var(--tx),var(--ty));opacity:0.8;}
  80%{opacity:1;}100%{transform:translate(0,0);opacity:0;}
}
 
.tree{position:fixed;bottom:0;font-size:90px;z-index:2;
  transform-origin:bottom center;user-select:none;line-height:1;}
@keyframes sway{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
 
.moon{position:fixed;top:24px;right:44px;font-size:58px;z-index:2;
  animation:moonpulse 5s ease-in-out infinite;}
@keyframes moonpulse{
  0%,100%{filter:drop-shadow(0 0 28px rgba(255,240,100,0.45))}
  50%{filter:drop-shadow(0 0 48px rgba(255,240,100,0.8))}
}
 
.card{
  position:relative;z-index:10;
  background:rgba(10,40,20,0.70);
  backdrop-filter:blur(18px);
  border:1px solid rgba(168,255,196,0.2);
  border-radius:32px;
  padding:2.5rem 2rem 2rem;
  max-width:400px;width:88%;
  text-align:center;
  box-shadow:0 0 60px rgba(0,180,70,0.1);
  animation:fadeUp 0.8s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
 
.bunny-svg{
  width:150px;height:150px;
  filter:drop-shadow(0 0 18px rgba(168,255,196,0.3));
  animation:bunnybounce 2.4s ease-in-out infinite;
}
@keyframes bunnybounce{
  0%,100%{transform:translateY(0) rotate(-2deg)}
  50%{transform:translateY(-12px) rotate(2deg)}
}
 
.question{
  font-family:'Pacifico',cursive;
  font-size:28px;
  color:#a8ffc4;
  text-shadow:0 0 20px rgba(168,255,196,0.5);
  margin:0.4rem 0 0.3rem;
}
.hint{font-size:12px;color:rgba(200,255,210,0.45);margin-bottom:1.8rem;}
 
.btn-group{
  display:flex;gap:16px;justify-content:center;align-items:center;
}
 
.btn-yes{
  background:linear-gradient(135deg,#2ecc71,#1a8c45);
  color:#fff;border:none;
  padding:14px 38px;border-radius:50px;
  font-size:18px;font-weight:900;cursor:pointer;
  font-family:'Nunito',sans-serif;
  box-shadow:0 4px 22px rgba(46,204,113,0.5);
  transition:transform 0.2s,box-shadow 0.2s;
  letter-spacing:1px;
}
.btn-yes:hover{transform:scale(1.1);box-shadow:0 6px 30px rgba(46,204,113,0.7);}
 
/* NO button — stays in flow, never fixed */
#noBtn{
  background:rgba(220,50,50,0.2);
  color:#ff9090;
  border:1.5px solid rgba(255,100,100,0.4);
  padding:14px 28px;
  border-radius:50px;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
  font-family:'Nunito',sans-serif;
  letter-spacing:1px;
  user-select:none;
  position:fixed;
  z-index:999;
  /* transition only for size — no position transition so it jumps */
  transition:font-size 0.15s, padding 0.15s, background 0.2s;
}
#noBtn:active{
  background:rgba(220,50,50,0.4);
}
 
.petal{position:fixed;pointer-events:none;z-index:9999;animation:petalfall linear infinite;}
@keyframes petalfall{
  0%{transform:translateY(-40px) rotate(0deg);opacity:1;}
  100%{transform:translateY(110vh) rotate(400deg);opacity:0;}
}
</style>
</head>
<body>
 
<div id="stars"></div>
<div id="fireflies"></div>
<div class="moon">🌕</div>
 
<div class="tree" style="left:0%;animation:sway 3.5s ease-in-out infinite;">🌲</div>
<div class="tree" style="left:9%;font-size:65px;animation:sway 4.2s ease-in-out infinite;animation-delay:.6s;">🌿</div>
<div class="tree" style="left:18%;font-size:52px;animation:sway 3.8s ease-in-out infinite;animation-delay:1s;">🍃</div>
<div class="tree" style="right:0%;animation:sway 3.5s ease-in-out infinite;animation-delay:.4s;">🌲</div>
<div class="tree" style="right:9%;font-size:65px;animation:sway 4.2s ease-in-out infinite;animation-delay:1s;">🌿</div>
<div class="tree" style="right:18%;font-size:52px;animation:sway 3.8s ease-in-out infinite;animation-delay:.3s;">🍃</div>
 
<div class="card">
  <div>
    <svg class="bunny-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="100" cy="148" rx="50" ry="44" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
      <ellipse cx="100" cy="92" rx="40" ry="37" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
      <ellipse cx="75" cy="44" rx="13" ry="32" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5" transform="rotate(-8,75,44)"/>
      <ellipse cx="75" cy="44" rx="7" ry="24" fill="#ffb3c6" transform="rotate(-8,75,44)"/>
      <ellipse cx="125" cy="44" rx="13" ry="32" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5" transform="rotate(8,125,44)"/>
      <ellipse cx="125" cy="44" rx="7" ry="24" fill="#ffb3c6" transform="rotate(8,125,44)"/>
      <circle cx="87" cy="88" r="6.5" fill="#2e7d32"/>
      <circle cx="113" cy="88" r="6.5" fill="#2e7d32"/>
      <circle cx="89" cy="86" r="2.8" fill="#fff"/>
      <circle cx="115" cy="86" r="2.8" fill="#fff"/>
      <ellipse cx="100" cy="99" rx="4.5" ry="3.5" fill="#ff8fab"/>
      <path d="M93 104 Q100 111 107 104" stroke="#a5d6a7" stroke-width="2" fill="none" stroke-linecap="round"/>
      <ellipse cx="80" cy="100" rx="9" ry="5.5" fill="rgba(255,140,140,0.35)"/>
      <ellipse cx="120" cy="100" rx="9" ry="5.5" fill="rgba(255,140,140,0.35)"/>
      <ellipse cx="58" cy="143" rx="15" ry="9" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5" transform="rotate(-30,58,143)"/>
      <ellipse cx="142" cy="143" rx="15" ry="9" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5" transform="rotate(30,142,143)"/>
      <text x="100" y="180" text-anchor="middle" font-size="24">💚</text>
      <circle cx="150" cy="160" r="10" fill="#fff" stroke="#a5d6a7" stroke-width="1"/>
    </svg>
  </div>
  <div class="question">Do you love me? 🐰</div>
  <div class="hint">think carefully before you answer... 🌿</div>
  <div class="btn-group">
    <button class="btn-yes" onclick="goYes()">💚 Yes!</button>
  </div>
</div>
 
<!-- NO button lives OUTSIDE card so it can float freely -->
<button id="noBtn" onclick="runAway()">❌ No</button>
 
<script>
/* Stars */
for(let i=0;i<130;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*2.5+0.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;
    opacity:${Math.random()*0.6+0.2};animation:twinkle ${2+Math.random()*4}s ease-in-out ${Math.random()*4}s infinite;`;
  document.getElementById('stars').appendChild(s);
}
/* Fireflies */
for(let i=0;i<14;i++){
  const f=document.createElement('div');f.className='ff';
  const tx=(Math.random()-0.5)*90,ty=(Math.random()-0.5)*80;
  f.style.cssText=`left:${Math.random()*100}vw;top:${25+Math.random()*65}vh;
    --tx:${tx}px;--ty:${ty}px;
    animation:ffmove ${4+Math.random()*5}s ease-in-out ${Math.random()*5}s infinite;`;
  document.getElementById('fireflies').appendChild(f);
}
 
/* ── NO button ── */
const noBtn = document.getElementById('noBtn');
const msgs  = ['❌ No','🙈 Nope!','😂 Never!','💀 NO!!','🚫 NOOO!!!'];
let noCount  = 0;
let noSize   = 18;  // px font-size
let noPad    = 14;  // px vertical padding
 
// Position NO button next to YES on load
function initNoPos(){
  const card = document.querySelector('.card');
  const cr   = card.getBoundingClientRect();
  const nb   = noBtn.getBoundingClientRect();
  // Place it to the right of center inside card bottom area
  noBtn.style.left = (cr.left + cr.width/2 + 12) + 'px';
  noBtn.style.top  = (cr.top  + cr.height - nb.height - 28) + 'px';
}
 
window.addEventListener('load',   initNoPos);
window.addEventListener('resize', initNoPos);
 
function runAway(){
  noCount++;
 
  // Grow font & padding (cap at reasonable max)
  noSize = Math.min(noSize + 6, 68);
  noPad  = Math.min(noPad  + 4, 38);
  noBtn.style.fontSize = noSize + 'px';
  noBtn.style.padding  = noPad + 'px ' + (noPad * 1.8) + 'px';
 
  // Jump to a new random spot — avoid edges
  // Wait one frame so offsetWidth/Height reflect new size
  requestAnimationFrame(()=>{
    const bw = noBtn.offsetWidth;
    const bh = noBtn.offsetHeight;
    const margin = 16;
    const maxX = window.innerWidth  - bw - margin;
    const maxY = window.innerHeight - bh - margin;
    const newX = margin + Math.random() * Math.max(0, maxX - margin);
    const newY = margin + Math.random() * Math.max(0, maxY - margin);
    noBtn.style.left = newX + 'px';
    noBtn.style.top  = newY + 'px';
  });
 
  // Update label
  noBtn.textContent = msgs[Math.min(noCount, msgs.length - 1)];
}
 
/* YES */
function goYes(){
  startPetals();
  setTimeout(()=> window.open('https://youtu.be/TsCXMRVAnVE?list=RDTsCXMRVAnVE','_blank'), 700);
}
 
/* Petals */
function startPetals(){
  const e=['🌸','🌹','💚','💖','✨','🌷','🍃','🌿','💝'];
  for(let i=0;i<32;i++){
    setTimeout(()=>{
      const p=document.createElement('div');p.className='petal';
      p.textContent=e[Math.floor(Math.random()*e.length)];
      p.style.left=Math.random()*100+'vw';
      p.style.fontSize=(14+Math.random()*18)+'px';
      p.style.animationDuration=(2.5+Math.random()*3)+'s';
      p.style.animationDelay=(Math.random()*0.5)+'s';
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),6000);
    },i*80);
  }
}
</script>
</body>
</html>
